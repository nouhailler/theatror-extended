[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Redirection SPA : toutes les routes servent index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Le service worker ne doit jamais être mis en cache long
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
